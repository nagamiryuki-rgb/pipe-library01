// ============================================================
// EXCEL I/O
// ============================================================
const EIO={
  parse(wb){
    const rs=n=>{const ws=wb.Sheets[n];return ws?XLSX.utils.sheet_to_json(ws,{defval:""}):[]};
    const books=rs("Books").map(r=>({id:r.BookID||"",title:r["タイトル"]||"",author:r["著者"]||"",category:r["カテゴリ"]||"",tags:(r["タグ"]||"").split(",").map(t=>t.trim()).filter(Boolean),description:r["説明"]||"",pages:parseInt(r["ページ数"])||0,year:parseInt(r["出版年"])||0,coverColor:r["表紙カラー"]||C.DK,status:r["ステータス"]||"有効",isbn:r["ISBN"]||"",thumbnail:r["サムネイル"]||""})).filter(b=>b.id&&b.status==="有効");
    const loans=rs("Loans").map(r=>({id:r.LoanID||"",bookId:r.BookID||"",bookTitle:r["タイトル"]||"",userName:r["利用者名"]||"",borrowDate:r["貸出日"]||"",dueDate:r["返却予定日"]||"",returnDate:r["返却日"]||""})).filter(l=>l.id);
    const requests=rs("Requests").map(r=>({id:r.RequestID||"",title:r["タイトル"]||"",author:r["著者"]||"",reason:r["リクエスト理由"]||"",requestedBy:r["リクエスト者"]||"",date:r["リクエスト日"]||"",status:r["ステータス"]||"pending"})).filter(r=>r.id);
    const activityLog=rs("ActivityLog").map(r=>({id:r.LogID||"",timestamp:r["日時"]||"",action:r["アクション"]||"",bookTitle:r["図書タイトル"]||"",userName:r["利用者"]||"",notes:r["備考"]||""})).filter(l=>l.id);
    const reviews=rs("Reviews").map(r=>({id:r.ReviewID||"",bookId:r.BookID||"",bookTitle:r["タイトル"]||"",userName:r["レビュアー"]||"",rating:parseInt(r["評価"])||0,comment:r["コメント"]||"",date:r["日付"]||""})).filter(r=>r.id);
    const config={};rs("Config").forEach(r=>{if(r["設定項目"])config[r["設定項目"]]=r["値"]});
    return{books,loans,requests,activityLog,reviews,config};
  },
  build(data,wb){
    const rep=(n,d)=>{if(wb&&wb.Sheets[n])delete wb.Sheets[n];const ws=XLSX.utils.json_to_sheet(d);if(wb){const idx=wb.SheetNames.indexOf(n);if(idx>=0)wb.Sheets[n]=ws;else XLSX.utils.book_append_sheet(wb,ws,n)}};
    if(!wb)wb=XLSX.utils.book_new();
    rep("Books",data.books.map(b=>({BookID:b.id,"タイトル":b.title,"著者":b.author,"カテゴリ":b.category,"タグ":(b.tags||[]).join(","),"説明":b.description,"ページ数":b.pages,"出版年":b.year,"表紙カラー":b.coverColor,"ISBN":b.isbn||"","サムネイル":b.thumbnail||"","ステータス":b.status||"有効"})));
    rep("Loans",data.loans.map(l=>({LoanID:l.id,BookID:l.bookId,"タイトル":l.bookTitle||data.books.find(b=>b.id===l.bookId)?.title||"","利用者名":l.userName,"貸出日":l.borrowDate,"返却予定日":l.dueDate,"返却日":l.returnDate||"","ステータス":!l.returnDate?(du(l.dueDate)<0?"延滞":"貸出中"):"返却済"})));
    rep("Requests",data.requests.map(r=>({RequestID:r.id,"タイトル":r.title,"著者":r.author,"リクエスト理由":r.reason,"リクエスト者":r.requestedBy,"リクエスト日":r.date,"ステータス":r.status})));
    rep("ActivityLog",data.activityLog.map(l=>({LogID:l.id,"日時":l.timestamp,"アクション":l.action,"図書タイトル":l.bookTitle,"利用者":l.userName,"備考":l.notes||""})));
    rep("Reviews",(data.reviews||[]).map(r=>({ReviewID:r.id,BookID:r.bookId,"タイトル":r.bookTitle,"レビュアー":r.userName,"評価":r.rating,"コメント":r.comment,"日付":r.date})));
    return wb;
  }
};

// ============================================================
// GOOGLE BOOKS API
// ============================================================
async function searchGoogleBooks(query){
  try{
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5&langRestrict=ja`);
    const d=await r.json();
    return(d.items||[]).map(i=>({title:i.volumeInfo.title||"",author:(i.volumeInfo.authors||[]).join(", "),description:i.volumeInfo.description||"",pages:i.volumeInfo.pageCount||0,year:parseInt((i.volumeInfo.publishedDate||"").slice(0,4))||0,isbn:(i.volumeInfo.industryIdentifiers||[]).find(x=>x.type==="ISBN_13")?.identifier||(i.volumeInfo.industryIdentifiers||[]).find(x=>x.type==="ISBN_10")?.identifier||"",thumbnail:i.volumeInfo.imageLinks?.thumbnail||"",category:(i.volumeInfo.categories||[])[0]||"ビジネス"}));
  }catch(e){console.error("Google Books error:",e);return[];}
}

const fmtD=d=>{if(!d)return"";if(typeof d==='string'&&d.includes('/'))return d;const dt=new Date(d);if(isNaN(dt))return String(d);return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,"0")}/${String(dt.getDate()).padStart(2,"0")}`};
const fmtDT=d=>{if(!d)return"";const dt=new Date(d);if(isNaN(dt))return String(d);return`${fmtD(d)} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`};
const du=d=>{if(!d)return 999;const dd=typeof d==='string'&&d.includes('/')?new Date(d.replace(/\//g,'-')):new Date(d);return Math.ceil((dd-new Date())/86400000)};
const gid=()=>"id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// ============================================================
// QR CODE COMPONENT

function QRCode({text,size=120}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){ref.current.innerHTML="";new window.QRCode(ref.current,{text,width:size,height:size,colorDark:C.DK,colorLight:"#ffffff"})}},[text,size]);
  return React.createElement("div",{ref,style:{display:"inline-block"}});
}

// ============================================================
// CHART COMPONENT
// ============================================================
function ChartCanvas({type,data:chartData,options,height=250}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{if(!ref.current)return;if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type,data:chartData,options:{...options,responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:"'Noto Sans JP'",size:11},color:C.TX}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[type,chartData,options]);
  return React.createElement("canvas",{ref,style:{height,width:"100%"}});
}
